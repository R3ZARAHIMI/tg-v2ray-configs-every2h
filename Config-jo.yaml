  ir:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ir.txt
    path: ./ruleset/ir.txt
    interval: 86400
  ir-cidr:
    type: http
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ircidr.txt
    path: ./ruleset/ir-cidr.txt
    interval: 86400
  openai:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.yaml
    path: ./ruleset/openai.yaml
    interval: 86400
  googleai:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-deepmind.yaml
    path: ./ruleset/googleai.yaml
    interval: 86400
  microsoft:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.yaml
    path: ./ruleset/microsoft.yaml
    interval: 86400
rules:
- GEOIP,lan,DIRECT,no-resolve
- NETWORK,udp,REJECT
- RULE-SET,ir,DIRECT
- RULE-SET,openai,DIRECT
- RULE-SET,googleai,DIRECT
- RULE-SET,microsoft,DIRECT
- RULE-SET,ir-cidr,DIRECT
- MATCH,✅ Selector
